<tui-root>
  <div class="tui-container" style="padding: 20px;">

    <!-- Фильтр (пример для ФИО) -->
    <div style="margin-bottom: 20px; max-width: 300px;">
      <tui-input tuiTextfieldSize="m"
                 [(ngModel)]="searchFio"
                 [tuiTextfieldCleaner]="true">
        Поиск по ФИО
      </tui-input>
    </div>

    <!-- Таблица -->
    <table tuiTable
           class="table"
           [columns]="columns"
           [(direction)]="direction"
           [(sorter)]="sorter">
      <thead>
        <tr tuiThGroup>
          <!-- resizable позволяет менять ширину колонок -->
          <th tuiTh [resizable]="true" *tuiHead="'id'" tuiSortable>ID</th>
          <th tuiTh [resizable]="true" *tuiHead="'text'" tuiSortable>Текст</th>
          <th tuiTh [resizable]="true" *tuiHead="'fio'" tuiSortable>ФИО</th>
          <th tuiTh [resizable]="true" *tuiHead="'date'" tuiSortable>Дата</th>
          <th tuiTh [resizable]="true" *tuiHead="'type'" tuiSortable>Тип события</th>
        </tr>
      </thead>

      <tbody tuiTbody [data]="filteredData">
        <tr tuiTr *ngFor="let item of filteredData">
          <td tuiTd *tuiCell="'id'">{{ item.id }}</td>
          <td tuiTd *tuiCell="'text'">{{ item.text }}</td>
          <td tuiTd *tuiCell="'fio'">{{ item.fio }}</td>
          <td tuiTd *tuiCell="'date'">{{ item.date }}</td>
          <td tuiTd *tuiCell="'type'">{{ item.type }}</td>
        </tr>
      </tbody>
    </table>

    <!-- Пагинация -->
    <tui-table-pagination [total]="total"
                          [(page)]="page"
                          [(size)]="size"></tui-table-pagination>

  </div>
</tui-root>
